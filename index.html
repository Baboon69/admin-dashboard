<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.8/iconify-icon.min.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <sidebar class="sidebar">
            <h1 class="logo">
                <span class="iconify" data-icon="mdi-view-dashboard"></span>
                <span class="logo-text">
                    Dashboard
                </span>
            </h1>
            <nav class="menu">
                <ul>
                    <li>
                        <a href="#" class="menu-link">
                            <span class="material-icons">
                                home
                            </span>
                            <span class="link-text">Home</span>
                        </a>
                    </li>
                </ul>
            </nav>
            <nav class="menu">
                <ul>
                    <li>
                        <a href="#" class="menu-link">
                            <span class="material-icons">
                                settings
                            </span>
                            <span class="link-text">Settings</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </sidebar>
        <main class="main">
            <header class="header">
                <form action="" class="search">
                    <button type="submit" class="button-icon">
                        <span class="iconify" data-icon="mdi-magnify"></span>
                    </button>
                    <input type="text" class="search-input">
                </form>
                <div class="profile">
                    <button type="submit" class="button-icon">
                        <span class="iconify" data-icon="mdi-bell-ring-outline"></span>
                    </button>
                    <img src="./res/profile.png" alt="" class="profile-avatar avatar">
                    <span class="profile-name">Morgan Oakley</span>
                </div>
                <div class="profile-info">
                    <img src="./res/profile.png" alt="" class="profile-info-avatar avatar">
                    <div class="profile-status">
                        <div class="profile-status-text">Hi there,</div>
                        <div class="profile-status-name">Morgan Oakley (@morgan)</div>
                    </div>
                </div>
                <ul class="header-buttons">
                    <li><button class="header-button">New</button></li>
                    <li><button class="header-button">Upload</button></li>
                    <li><button class="header-button">Share</button></li>
                </ul>
            </header>
            <section class="projects">
                <h3 class="section-title">Your Projects</h3>
                <div class="projects-container">
                    <div class="project">
                        <h4 class="project-title">title</h4>
                        <p class="project-text">text</p>
                        <ul class="project-links">
                            <li><a href="" class="project-link"><span class="iconify" data-icon="mdi-star-plus-outline"></span></a></li>
                            <li><a href="" class="project-link"><span class="iconify" data-icon="mdi-eye-plus-outline"></span></a></li>
                            <li><a href="" class="project-link"><span class="iconify" data-icon="mdi-source-fork"></span></a></li>
                        </ul>
                    </div>
                    <div class="project">
                        <h4 class="project-title">title</h4>
                        <p class="project-text">text</p>
                        <ul class="project-links">
                            <li><a href="" class="project-link">1</a></li>
                            <li><a href="" class="project-link">2</a></li>
                            <li><a href="" class="project-link">3</a></li>
                        </ul>
                    </div>
                </div>
            </section>
            <section class="announcements">announcements</section>
            <section class="trending">trending</section>
        </main>
    </div>
</body>
</html>
